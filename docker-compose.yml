services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
