<section id="reviews" class="reviews-section">
  <div class="container">
    <div class="section-header">
      <span class="section-label">Reviews</span>
      <h2 class="section-title">What Our Customers Say</h2>
      <div class="overall-rating">
        <span class="overall-score">{{ overallRating.toFixed(1) }}</span>
        <div class="overall-stars">
          @for (star of stars(5); track star) {
            <i class="pi pi-star-fill active"></i>
          }
        </div>
        <!-- <span class="overall-count">from {{ totalReviews }} reviews</span> -->
         <span class="overall-count">from 238 reviews</span>
      </div>
    </div>

    <div class="reviews-grid">
      @for (review of reviews; track review.name) {
        <div class="review-card">
          <div class="review-header">
            <div class="reviewer-avatar">{{ initials(review.name) }}</div>
            <div class="reviewer-meta">
              <span class="reviewer-name">{{ review.name }}</span>
              <span class="review-time">Google Review</span>
            </div>
          </div>
          <div class="review-stars">
            @for (star of stars(5); track star) {
              <i class="pi pi-star-fill" [class.active]="star <= review.rating"></i>
            }
          </div>
          <p class="review-text">{{ review.text }}</p>
        </div>
      }
    </div>
  </div>
</section>
